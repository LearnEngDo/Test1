<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Engdo - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background-color: #FFE4EC;
    font-family: 'Trebuchet MS', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-family: 'Chewy', cursive;
    font-size: 56px;
    color: #FFFFFF;
    -webkit-text-stroke: 2px #A8D8D0;
    text-shadow: 3px 3px 0 #A8D8D0, 0 6px 12px rgba(0,0,0,0.15);
    margin-bottom: 40px;
    animation: melayang 3s ease-in-out infinite;
  }

  @keyframes melayang {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
  }

  .warna-eng {
    color: #FBE1E7;
    -webkit-text-stroke: 2px #E8B8C5;
  }

  .warna-do {
    color: #E8DCF3;
    -webkit-text-stroke: 2px #C9AEDD;
  }

  @keyframes kilau {
    0% { background-position: 200% 0; }
    100% { background-position: -100% 0; }
  }

  .button-container {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    max-width: 900px;
    margin-bottom: 30px;
  }

  .unit-box {
    position: relative;
    display: block;
    width: 150px;
    height: 150px;
    margin-top: 15px;
    text-decoration: none;
    font-family: 'Chewy', cursive;
    font-weight: normal;
    font-size: 19px;
    color: #1B3A4B;
    cursor: pointer;
    transition: transform 0.15s;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
  }

  .heart-layer {
    position: absolute;
    clip-path: url(#heartClip);
  }

  .heart-abu {
    inset: 0;
    background: #D6D6D6;
  }

  .heart-putih {
    inset: 2px;
    background: #FFFFFF;
  }

  .heart-pinggir {
    inset: 6px;
    background: var(--warna-pinggir);
  }

  .heart-isi {
    inset: 9px;
    background: var(--warna-isi);
  }

  .unit-box .label {
    position: absolute;
    z-index: 5;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    text-align: center;
    font-family: 'Chewy', cursive;
    font-weight: normal;
    font-size: 19px;
  }

  .unit-box:hover {
    transform: translateY(-4px) scale(1.05);
  }

  .unit-box:active {
    transform: scale(0.95);
  }

  .unit-1 { --warna-isi: #FFD966; --warna-pinggir: #E0B94D; }
  .unit-2 { --warna-isi: #A8D8D0; --warna-pinggir: #7CB8AE; }
  .unit-3 { --warna-isi: #F4C2C2; --warna-pinggir: #E098A0; }
  .unit-4 { --warna-isi: #B8D4E8; --warna-pinggir: #8FB4D4; }
  .unit-5 { --warna-isi: #D4B8E8; --warna-pinggir: #B48FD4; }
  .unit-6 { --warna-isi: #FFC299; --warna-pinggir: #E0A070; }
  .unit-7 { --warna-isi: #C2E8B8; --warna-pinggir: #96C989; }
  .unit-8 { --warna-isi: #B8E8DE; --warna-pinggir: #8FCABE; }
  .unit-9 { --warna-isi: #F0D9B8; --warna-pinggir: #D1B98C; }
  .unit-10 { --warna-isi: #E8B8C2; --warna-pinggir: #C98F9C; }

  .special-container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .special-box {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 90px;
    border-radius: 16px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    border: 3px solid;
  }

  .special-box:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  }

  .special-box:active {
    transform: translateY(-1px) scale(0.97);
  }

  .game-box { background-color: #FFF3A3; border-color: #E0D470; color: #1B3A4B; }
  .ask-box { background-color: #C9F0FF; border-color: #8FCFE0; color: #1B3A4B; }
</style>
</head>
<body>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
        <path d="M0.5,0.88 C0.5,0.88 0.1,0.6 0.1,0.35 C0.1,0.15 0.28,0.02 0.45,0.08 C0.5,0.1 0.5,0.18 0.5,0.18 C0.5,0.18 0.5,0.1 0.55,0.08 C0.72,0.02 0.9,0.15 0.9,0.35 C0.9,0.6 0.5,0.88 0.5,0.88 Z"/>
      </clipPath>
    </defs>
  </svg>

  <h1>Learn <span class="warna-eng">Eng</span><span class="warna-do">do</span></h1>

  <div class="button-container">
    <a href="https://learnengdo.com/Unit_1" class="unit-box unit-1 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 1</span></a>
    <a href="https://learnengdo.com/Unit_2" class="unit-box unit-2 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 2</span></a>
    <a href="https://learnengdo.com/Unit_3" class="unit-box unit-3 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 3</span></a>
    <a href="https://learnengdo.com/Unit_4" class="unit-box unit-4 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 4</span></a>
    <a href="https://learnengdo.com/Unit_5" class="unit-box unit-5 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 5</span></a>
    <a href="https://learnengdo.com/Unit_6" class="unit-box unit-6 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 6</span></a>
    <a href="https://learnengdo.com/Unit_7" class="unit-box unit-7 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 7</span></a>
    <a href="https://learnengdo.com/Unit_8" class="unit-box unit-8 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 8</span></a>
    <a href="https://learnengdo.com/Unit_9" class="unit-box unit-9 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 9</span></a>
    <a href="https://learnengdo.com/Unit_10" class="unit-box unit-10 sound-click"><span class="heart-layer heart-abu"></span><span class="heart-layer heart-putih"></span><span class="heart-layer heart-pinggir"></span><span class="heart-layer heart-isi"></span><span class="label">Unit 10</span></a>
  </div>

  <div class="special-container">
    <a href="https://learnengdo.com/Game" class="special-box game-box sound-click">🎮 Game</a>
    <a href="https://learnengdo.com/Ask_Me" class="special-box ask-box sound-click">💬 Ask Me</a>
  </div>

  <script>
    function mainkanSuaraKlik() {
      var AudioContext = window.AudioContext || window.webkitAudioContext;
      var ctx = new AudioContext();

      var mulai = ctx.currentTime;

      var osc = ctx.createOscillator();
      var gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(420, mulai);
      osc.frequency.exponentialRampToValueAtTime(950, mulai + 0.08);
      osc.frequency.exponentialRampToValueAtTime(750, mulai + 0.15);

      gain.gain.setValueAtTime(0.001, mulai);
      gain.gain.exponentialRampToValueAtTime(0.28, mulai + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, mulai + 0.17);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(mulai);
      osc.stop(mulai + 0.19);
    }

    var semuaTombol = document.querySelectorAll(".sound-click");
    semuaTombol.forEach(function (tombol) {
      tombol.addEventListener("click", function () {
        mainkanSuaraKlik();
      });
    });
  </script>

</body>
</html>
